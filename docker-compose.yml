services:
  controlplane:
    image: ${DRIFTBASE_CONTROLPLANE_IMAGE:-ghcr.io/lassejlv/driftbase-controlplane:latest}
    build:
      context: .
      dockerfile: Dockerfile.controlplane
    pull_policy: always
    restart: unless-stopped
    environment:
      DRIFTBASE_BIND_ADDR: 0.0.0.0:8080
      DRIFTBASE_DATABASE_URL: ${DRIFTBASE_DATABASE_URL:?DRIFTBASE_DATABASE_URL is required}
      DRIFTBASE_DATABASE_POOLED_URL: ${DRIFTBASE_DATABASE_POOLED_URL:-}
      DATABASE_POOLED_URL: ${DATABASE_POOLED_URL:-}
      DRIFTBASE_MASTER_KEY: ${DRIFTBASE_MASTER_KEY:?DRIFTBASE_MASTER_KEY is required}
      DRIFTBASE_PUBLIC_URL: ${DRIFTBASE_PUBLIC_URL:-https://driftbase.app}
      DRIFTBASE_COOKIE_SECURE: "true"
      DRIFTBASE_AGENT_IMAGE: ${DRIFTBASE_AGENT_IMAGE:-ghcr.io/lassejlv/driftbase-agent:latest}
      DRIFTBASE_EDGE_IMAGE: ${DRIFTBASE_EDGE_IMAGE:-ghcr.io/lassejlv/driftbase-edge:latest}
      DRIFTBASE_EDGE_PUBLIC_HOSTNAME: ${DRIFTBASE_EDGE_PUBLIC_HOSTNAME:-edge.driftbase.app}
      DRIFTBASE_DEFAULT_HETZNER_SERVER_TYPE: ${DRIFTBASE_DEFAULT_HETZNER_SERVER_TYPE:-}
      DRIFTBASE_MANAGED_HETZNER_API_TOKEN: ${DRIFTBASE_MANAGED_HETZNER_API_TOKEN:-}
      # Bundled registry plumbing; empty disables the auth proxy + the
      # credential-create `username = id` override.
      DRIFTBASE_REGISTRY_SITE: ${REGISTRY_SITE:-registry.driftbase.app}
      DRIFTBASE_REGISTRY_UPSTREAM: ${DRIFTBASE_REGISTRY_UPSTREAM:-http://registry:5000}
      DRIFTBASE_GITHUB_APP_ID: ${DRIFTBASE_GITHUB_APP_ID:-}
      DRIFTBASE_GITHUB_APP_SLUG: ${DRIFTBASE_GITHUB_APP_SLUG:-}
      DRIFTBASE_GITHUB_APP_CLIENT_ID: ${DRIFTBASE_GITHUB_APP_CLIENT_ID:-}
      DRIFTBASE_GITHUB_APP_CLIENT_SECRET: ${DRIFTBASE_GITHUB_APP_CLIENT_SECRET:-}
      DRIFTBASE_GITHUB_APP_WEBHOOK_SECRET: ${DRIFTBASE_GITHUB_APP_WEBHOOK_SECRET:-}
      DRIFTBASE_GITHUB_APP_PRIVATE_KEY: ${DRIFTBASE_GITHUB_APP_PRIVATE_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8080"
    networks:
      - driftbase

  web:
    image: ${DRIFTBASE_WEB_IMAGE:-ghcr.io/lassejlv/driftbase-web:latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - controlplane
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_SITE: ${CADDY_SITE:-driftbase.app}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@driftbase.app}
      REGISTRY_SITE: ${REGISTRY_SITE:-registry.driftbase.app}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - driftbase

  edge:
    image: ${DRIFTBASE_EDGE_IMAGE:-ghcr.io/lassejlv/driftbase-edge:latest}
    build:
      context: .
      dockerfile: Dockerfile.edge
    profiles:
      - edge
    pull_policy: always
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    security_opt:
      - apparmor=unconfined
    environment:
      DRIFTBASE_CONTROL_PLANE_URL: ${DRIFTBASE_PUBLIC_URL:-https://driftbase.app}
      DRIFTBASE_EDGE_BOOTSTRAP_TOKEN: ${DRIFTBASE_EDGE_BOOTSTRAP_TOKEN:-}
      DRIFTBASE_EDGE_NODE_TOKEN: ${DRIFTBASE_EDGE_NODE_TOKEN:-}
      DRIFTBASE_EDGE_NETWORK_DIR: /var/lib/driftbase/edge-network
      DRIFTBASE_EDGE_CADDY_DIR: /var/lib/driftbase/edge-caddy
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - edge_network:/var/lib/driftbase/edge-network
      - edge_caddy_data:/data
      - edge_caddy_config:/config

  # Self-hosted Docker Registry for git-service build outputs. No auth on the
  # registry itself — the service publishes no host ports and is only reachable
  # from the `driftbase` docker network. The control plane's registry_proxy module
  # terminates auth (basic auth against the credentials table, with per-workspace
  # path scoping) and then forwards the request here.
  #
  # Storage backend: filesystem by default. Set REGISTRY_STORAGE_S3_BUCKET in
  # `.env` to switch to an S3-compatible bucket (AWS S3, Hetzner Object Storage,
  # Cloudflare R2, MinIO, Backblaze B2). See `.env.example` for the full env
  # contract. The host-side `data/registry` mount is kept even in S3 mode so
  # operators can flip back without losing the host directory.
  registry:
    image: registry:2
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/driftbase-registry-entrypoint.sh"]
    environment:
      REGISTRY_STORAGE_S3_BUCKET: ${REGISTRY_STORAGE_S3_BUCKET:-}
      REGISTRY_STORAGE_S3_REGION: ${REGISTRY_STORAGE_S3_REGION:-}
      REGISTRY_STORAGE_S3_REGIONENDPOINT: ${REGISTRY_STORAGE_S3_REGIONENDPOINT:-}
      REGISTRY_STORAGE_S3_ACCESSKEY: ${REGISTRY_STORAGE_S3_ACCESSKEY:-}
      REGISTRY_STORAGE_S3_SECRETKEY: ${REGISTRY_STORAGE_S3_SECRETKEY:-}
      REGISTRY_STORAGE_S3_FORCEPATHSTYLE: ${REGISTRY_STORAGE_S3_FORCEPATHSTYLE:-true}
      REGISTRY_STORAGE_S3_SECURE: ${REGISTRY_STORAGE_S3_SECURE:-true}
      REGISTRY_STORAGE_S3_ROOTDIRECTORY: ${REGISTRY_STORAGE_S3_ROOTDIRECTORY:-}
    volumes:
      - ./registry/entrypoint.sh:/driftbase-registry-entrypoint.sh:ro
      - ${REGISTRY_STORAGE_PATH:-./data/registry}:/var/lib/registry
    networks:
      - driftbase

volumes:
  caddy_data:
  caddy_config:
  edge_network:
  edge_caddy_data:
  edge_caddy_config:

networks:
  driftbase:
