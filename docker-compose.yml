services:
  controlplane:
    image: ${ZEDIZ_CONTROLPLANE_IMAGE:-ghcr.io/lassejlv/zediz-controlplane:latest}
    build:
      context: .
      dockerfile: Dockerfile.controlplane
    pull_policy: always
    restart: unless-stopped
    environment:
      ZEDIZ_BIND_ADDR: 0.0.0.0:8080
      ZEDIZ_DATABASE_URL: ${ZEDIZ_DATABASE_URL:?ZEDIZ_DATABASE_URL is required}
      ZEDIZ_MASTER_KEY: ${ZEDIZ_MASTER_KEY:?ZEDIZ_MASTER_KEY is required}
      ZEDIZ_PUBLIC_URL: ${ZEDIZ_PUBLIC_URL:-https://zediz.dev}
      ZEDIZ_COOKIE_SECURE: "true"
      ZEDIZ_AGENT_IMAGE: ${ZEDIZ_AGENT_IMAGE:-ghcr.io/lassejlv/zediz-agent:latest}
      # Bundled registry plumbing; empty disables the auth proxy + the
      # credential-create `username = id` override.
      ZEDIZ_REGISTRY_SITE: ${REGISTRY_SITE:-registry.zediz.dev}
      ZEDIZ_REGISTRY_UPSTREAM: ${ZEDIZ_REGISTRY_UPSTREAM:-http://registry:5000}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8080"
    networks:
      - zediz

  web:
    image: ${ZEDIZ_WEB_IMAGE:-ghcr.io/lassejlv/zediz-web:latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - controlplane
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_SITE: ${CADDY_SITE:-zediz.dev}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@zediz.dev}
      REGISTRY_SITE: ${REGISTRY_SITE:-registry.zediz.dev}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - zediz

  # Self-hosted Docker Registry for git-service build outputs. No auth on the
  # registry itself — the service publishes no host ports and is only reachable
  # from the `zediz` docker network. The control plane's registry_proxy module
  # terminates auth (basic auth against the credentials table, with per-workspace
  # path scoping) and then forwards the request here.
  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ${REGISTRY_STORAGE_PATH:-./data/registry}:/var/lib/registry
    networks:
      - zediz

volumes:
  caddy_data:
  caddy_config:

networks:
  zediz:
