services:
  controlplane:
    image: ${DRIFTBASE_CONTROLPLANE_IMAGE:-ghcr.io/lassejlv/driftbase-controlplane:latest}
    build:
      context: .
      dockerfile: Dockerfile.controlplane
    pull_policy: always
    restart: unless-stopped
    environment:
      DRIFTBASE_BIND_ADDR: 0.0.0.0:8080
      DRIFTBASE_DATABASE_URL: ${DRIFTBASE_DATABASE_URL:?DRIFTBASE_DATABASE_URL is required}
      DRIFTBASE_DATABASE_POOLED_URL: ${DRIFTBASE_DATABASE_POOLED_URL:-}
      DATABASE_POOLED_URL: ${DATABASE_POOLED_URL:-}
      DRIFTBASE_MASTER_KEY: ${DRIFTBASE_MASTER_KEY:?DRIFTBASE_MASTER_KEY is required}
      DRIFTBASE_PUBLIC_URL: ${DRIFTBASE_PUBLIC_URL:-https://driftbase.app}
      DRIFTBASE_COOKIE_SECURE: "true"
      DRIFTBASE_AGENT_IMAGE: ${DRIFTBASE_AGENT_IMAGE:-ghcr.io/lassejlv/driftbase-agent:latest}
      # Bundled registry plumbing; empty disables the auth proxy + the
      # credential-create `username = id` override.
      DRIFTBASE_REGISTRY_SITE: ${REGISTRY_SITE:-registry.driftbase.app}
      DRIFTBASE_REGISTRY_UPSTREAM: ${DRIFTBASE_REGISTRY_UPSTREAM:-http://registry:5000}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8080"
    networks:
      - driftbase

  web:
    image: ${DRIFTBASE_WEB_IMAGE:-ghcr.io/lassejlv/driftbase-web:latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - controlplane
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_SITE: ${CADDY_SITE:-driftbase.app}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@driftbase.app}
      REGISTRY_SITE: ${REGISTRY_SITE:-registry.driftbase.app}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - driftbase

  # Self-hosted Docker Registry for git-service build outputs. No auth on the
  # registry itself — the service publishes no host ports and is only reachable
  # from the `driftbase` docker network. The control plane's registry_proxy module
  # terminates auth (basic auth against the credentials table, with per-workspace
  # path scoping) and then forwards the request here.
  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ${REGISTRY_STORAGE_PATH:-./data/registry}:/var/lib/registry
    networks:
      - driftbase

volumes:
  caddy_data:
  caddy_config:

networks:
  driftbase:
