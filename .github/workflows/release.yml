name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  agent:
    name: build agent (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p driftbase-agent --target ${{ matrix.target }}
      - name: Rename artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/driftbase-agent dist/driftbase-agent-${{ matrix.target }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/driftbase-agent-${{ matrix.target }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  images:
    name: build & push images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push controlplane
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/controlplane.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/controlplane:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/controlplane:latest
      - name: Build & push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/agent:latest