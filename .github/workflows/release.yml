name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  agent:
    name: build agent (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build release binary
        run: cargo build --release -p driftbase-agent --target x86_64-unknown-linux-gnu
      - name: Rename artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/driftbase-agent dist/driftbase-agent-x86_64-unknown-linux-gnu
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: dist/driftbase-agent-x86_64-unknown-linux-gnu
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  images:
    name: build & push images
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@a592b831ebb20e68f7cf47329cf2c3c67b8a7655
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push controlplane
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8
        with:
          context: .
          file: docker/controlplane.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/controlplane:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/controlplane:latest', github.repository_owner) || '' }}
      - name: Build & push agent
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8
        with:
          context: .
          file: docker/agent.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/agent:latest', github.repository_owner) || '' }}
      - name: Build & push edge
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8
        with:
          context: .
          file: docker/edge.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/edge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/driftbase-edge:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/edge:latest', github.repository_owner) || '' }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}/driftbase-edge:latest', github.repository_owner) || '' }}
