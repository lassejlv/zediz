name: Deploy to driftbase server

# Manual-only: pulls the latest main on the server and bounces docker-compose.
# Requires these repo secrets:
#   DEPLOY_SSH_HOST  — host or IP of the driftbase server
#   DEPLOY_SSH_USER  — SSH user (e.g. root)
#   DEPLOY_SSH_KEY   — private key (PEM) authorized on the server
# Optional:
#   DEPLOY_SSH_PORT  — defaults to 22

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions: {}
    steps:
      - name: SSH and redeploy
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/driftbase_deploy
          chmod 600 ~/.ssh/driftbase_deploy
          ssh \
            -i ~/.ssh/driftbase_deploy \
            -p "$port" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" <<'EOF'
          set -euo pipefail
          cd driftbase
          git pull --ff-only
          docker compose down
          docker compose up -d
          EOF
